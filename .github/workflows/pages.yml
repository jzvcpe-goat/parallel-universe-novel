name: Deploy Creator Studio Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install --include=optional

      - name: Install app platform bindings
        run: npm --prefix app install --include=optional

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run runtime checks
        env:
          GH_TOKEN: ${{ github.token }}
          VITE_PUBLIC_RUNTIME_MODE: ${{ vars.VITE_PUBLIC_RUNTIME_MODE || 'disabled' }}
          VITE_ALLOW_LOCAL_CREATOR_FALLBACK: false
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AGENT_RUNTIME_BASE_URL: ${{ vars.VITE_AGENT_RUNTIME_BASE_URL }}
        run: npm run test

      - name: Gate public runtime release mode
        env:
          GH_TOKEN: ${{ github.token }}
          VITE_PUBLIC_RUNTIME_MODE: ${{ vars.VITE_PUBLIC_RUNTIME_MODE || 'disabled' }}
          VITE_ALLOW_LOCAL_CREATOR_FALLBACK: false
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AGENT_RUNTIME_BASE_URL: ${{ vars.VITE_AGENT_RUNTIME_BASE_URL }}
        run: |
          npm run check:public-runtime-preview
          npm run audit:live-runtime-readiness
          if [ "$VITE_PUBLIC_RUNTIME_MODE" = "live" ]; then
            REQUIRE_PUBLIC_RUNTIME=true npm run check:public-runtime-preview
            REQUIRE_LIVE_RUNTIME_READY=true npm run audit:live-runtime-readiness
            npm install --no-save playwright
            npx playwright install chromium
            REQUIRE_PUBLIC_RUNTIME=true npm run qa:live-runtime-browser
          fi

      - name: Upload runtime readiness ledger
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-readiness-ledger
          path: artifacts/runtime/live-runtime-readiness-*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Build Creator Studio
        env:
          VITE_ROUTER_MODE: hash
          VITE_PUBLIC_RUNTIME_MODE: ${{ vars.VITE_PUBLIC_RUNTIME_MODE || 'disabled' }}
          VITE_ALLOW_LOCAL_CREATOR_FALLBACK: false
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AGENT_RUNTIME_BASE_URL: ${{ vars.VITE_AGENT_RUNTIME_BASE_URL }}
        run: |
          npm --prefix app run build
          cp app/dist/index.html app/dist/404.html

      - name: Scan built Pages privacy
        run: npm run scan:reference-privacy

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
