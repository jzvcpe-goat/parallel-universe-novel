name: Deploy Creator Studio Preview

on:
  workflow_run:
    workflows:
      - Publish Runtime Images
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install --include=optional

      - name: Install app platform bindings
        run: npm --prefix app install --include=optional

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Install browser QA dependencies
        run: npx playwright install chromium

      - name: Run runtime checks
        env:
          GH_TOKEN: ${{ github.token }}
          VITE_PUBLIC_RUNTIME_MODE: ${{ vars.VITE_PUBLIC_RUNTIME_MODE || 'disabled' }}
          VITE_ALLOW_LOCAL_CREATOR_FALLBACK: false
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AGENT_RUNTIME_BASE_URL: ${{ vars.VITE_AGENT_RUNTIME_BASE_URL }}
          REMOTE_API_SERVICE_ID: ${{ vars.REMOTE_API_SERVICE_ID }}
          REMOTE_AGENT_SERVICE_ID: ${{ vars.REMOTE_AGENT_SERVICE_ID }}
          REMOTE_API_SECRETS_CONFIGURED: ${{ vars.REMOTE_API_SECRETS_CONFIGURED || 'false' }}
          REMOTE_AGENT_SECRETS_CONFIGURED: ${{ vars.REMOTE_AGENT_SECRETS_CONFIGURED || 'false' }}
        run: npm run test

      - name: Run local live runtime browser QA
        run: npm run qa:live-runtime-local

      - name: Upload local live runtime visual QA
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: local-live-runtime-visual-qa
          path: artifacts/visual-qa/p15-live-runtime-e2e-*.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Gate public runtime release mode
        env:
          GH_TOKEN: ${{ github.token }}
          VITE_PUBLIC_RUNTIME_MODE: ${{ vars.VITE_PUBLIC_RUNTIME_MODE || 'disabled' }}
          VITE_ALLOW_LOCAL_CREATOR_FALLBACK: false
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AGENT_RUNTIME_BASE_URL: ${{ vars.VITE_AGENT_RUNTIME_BASE_URL }}
          REMOTE_API_SERVICE_ID: ${{ vars.REMOTE_API_SERVICE_ID }}
          REMOTE_AGENT_SERVICE_ID: ${{ vars.REMOTE_AGENT_SERVICE_ID }}
          REMOTE_API_SECRETS_CONFIGURED: ${{ vars.REMOTE_API_SECRETS_CONFIGURED || 'false' }}
          REMOTE_AGENT_SECRETS_CONFIGURED: ${{ vars.REMOTE_AGENT_SECRETS_CONFIGURED || 'false' }}
        run: |
          npm run check:public-runtime-preview
          npm run audit:live-runtime-readiness
          npm run check:live-cutover-attestation
          npm run check:live-rollback-rehearsal
          npm run check:remote-runtime-activation-control
          if [ "$VITE_PUBLIC_RUNTIME_MODE" = "live" ]; then
            REQUIRE_PUBLIC_RUNTIME=true npm run check:public-runtime-preview
            REQUIRE_LIVE_RUNTIME_READY=true npm run audit:live-runtime-readiness
            REQUIRE_LIVE_CUTOVER_ATTESTED=true npm run check:live-cutover-attestation
            REQUIRE_REMOTE_ACTIVATION_CONTROL_READY=true npm run check:remote-runtime-activation-control
            REQUIRE_PUBLIC_RUNTIME=true npm run qa:live-runtime-browser
          fi

      - name: Upload runtime readiness ledger
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-readiness-ledger
          path: artifacts/runtime/live-runtime-readiness-*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload live cutover attestation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-cutover-attestation
          path: artifacts/runtime/live-cutover-attestation-*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload live rollback rehearsal
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-rollback-rehearsal
          path: artifacts/runtime/live-rollback-rehearsal-*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload remote runtime activation control
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-runtime-activation-control
          path: artifacts/runtime/remote-activation-control-*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload remote assignment handoff
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-assignment-handoff
          path: |
            artifacts/runtime/remote-assignment-handoff-*.json
            artifacts/runtime/remote-assignment-handoff-*.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload remote assignment schema gate
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-assignment-schema
          path: artifacts/runtime/remote-assignment-schema-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload remote assignment execution pack
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-assignment-execution-pack
          path: |
            artifacts/runtime/remote-assignment-execution-pack-*.json
            artifacts/runtime/remote-assignment-execution-pack-*.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload remote assignment fixture gate
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-assignment-fixture-gate
          path: artifacts/runtime/remote-assignment-fixture-gate-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload remote runtime blocker ledger
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-runtime-blockers
          path: |
            artifacts/runtime/remote-runtime-blockers-*.json
            artifacts/runtime/remote-runtime-blockers-*.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload remote assignment fill plan
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-assignment-fill-plan
          path: |
            artifacts/runtime/remote-assignment-fill-plan-*.json
            artifacts/runtime/remote-assignment-fill-plan-*.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload remote assignment strict-run package
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-assignment-strict-run-package
          path: |
            artifacts/runtime/remote-assignment-strict-run-package-*.json
            artifacts/runtime/remote-assignment-strict-run-package-*.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload remote operator readiness packet
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-operator-readiness-packet
          path: |
            artifacts/runtime/remote-operator-readiness-packet-*.json
            artifacts/runtime/remote-operator-readiness-packet-*.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload remote operator return intake
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-operator-return-intake
          path: |
            artifacts/runtime/remote-operator-return-intake-*.json
            artifacts/runtime/remote-operator-return-intake-*.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload operator assignment evidence intake
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: operator-assignment-evidence-intake
          path: |
            artifacts/runtime/operator-assignment-evidence-intake-*.json
            artifacts/runtime/operator-assignment-evidence-intake-*.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload edge-only operator evidence packet
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: edge-only-operator-evidence-packet
          path: |
            artifacts/runtime/edge-only-operator-evidence-packet-*.json
            artifacts/runtime/edge-only-operator-evidence-packet-*.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload edge-only Data API evidence readiness
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: edge-only-data-api-evidence-readiness
          path: artifacts/runtime/edge-only-data-api-evidence-readiness-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload edge-only Data API strict intake
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: edge-only-data-api-strict-intake
          path: artifacts/runtime/edge-only-data-api-strict-intake-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload edge-only Data API evidence transition fixture
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: edge-only-data-api-evidence-transition-fixture
          path: artifacts/runtime/edge-only-data-api-evidence-transition-fixture-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload operator assignment command consistency
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: operator-assignment-loop-command-consistency
          path: artifacts/runtime/operator-assignment-loop-command-consistency-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload operator assignment current-head coherence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: operator-assignment-current-head-coherence
          path: artifacts/runtime/operator-assignment-current-head-coherence-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload operator assignment transition fixture
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: operator-assignment-transition-fixture
          path: artifacts/runtime/operator-assignment-transition-fixture-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload runtime image local smoke
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-image-local-smoke
          path: artifacts/runtime/runtime-image-local-smoke-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload zero-cost reader edge sync
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zero-cost-reader-edge-sync
          path: artifacts/runtime/zero-cost-reader-edge-sync-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload remote health evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: remote-health-evidence
          path: artifacts/runtime/remote-health-evidence-attestation-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Build Creator Studio
        env:
          VITE_ROUTER_MODE: hash
          VITE_PUBLIC_RUNTIME_MODE: ${{ vars.VITE_PUBLIC_RUNTIME_MODE || 'disabled' }}
          VITE_ALLOW_LOCAL_CREATOR_FALLBACK: false
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AGENT_RUNTIME_BASE_URL: ${{ vars.VITE_AGENT_RUNTIME_BASE_URL }}
        run: |
          npm --prefix app run build
          cp app/dist/index.html app/dist/404.html

      - name: Scan built Pages privacy
        run: |
          npm run scan:reference-privacy
          PUBLIC_PROJECTION_PRIVACY_SKIP_BUILD=true npm run check:public-projection-privacy
          npm run check:reference-work-encryption-completion
          npm run check:representative-work-custody
          npm run check:kernel-constraint-reference-encryption

      - name: Upload reference privacy evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reference-privacy
          path: artifacts/runtime/reference-privacy-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload public projection privacy evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: public-projection-privacy
          path: artifacts/runtime/public-projection-privacy-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload reference work encryption completion evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reference-work-encryption-completion
          path: artifacts/runtime/reference-work-encryption-completion-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload representative work custody evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: representative-work-custody
          path: artifacts/runtime/representative-work-custody-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload kernel constraint reference encryption evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kernel-constraint-reference-encryption
          path: artifacts/runtime/kernel-constraint-reference-encryption-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/dist

      - name: Check current run evidence artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_GITHUB_ACTIONS_ARTIFACTS_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:github-actions-artifacts

      - name: Check public privacy artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_PUBLIC_PRIVACY_ARTIFACTS_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:public-privacy-artifacts

      - name: Check remote assignment artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_REMOTE_ASSIGNMENT_ARTIFACTS_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:remote-assignment-artifacts

      - name: Check remote assignment handoff artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_REMOTE_ASSIGNMENT_HANDOFF_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:remote-assignment-handoff-artifact

      - name: Check remote runtime blocker artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_REMOTE_RUNTIME_BLOCKERS_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:remote-runtime-blockers-artifact

      - name: Check remote assignment fill plan artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_REMOTE_ASSIGNMENT_FILL_PLAN_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:remote-assignment-fill-plan-artifact

      - name: Check remote assignment strict-run package artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_REMOTE_ASSIGNMENT_STRICT_RUN_PACKAGE_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:remote-assignment-strict-run-package-artifact

      - name: Check remote operator readiness packet artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_REMOTE_OPERATOR_READINESS_PACKET_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:remote-operator-readiness-packet-artifact

      - name: Check remote operator return intake artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_REMOTE_OPERATOR_RETURN_INTAKE_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:remote-operator-return-intake-artifact

      - name: Check operator assignment evidence intake artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_OPERATOR_ASSIGNMENT_EVIDENCE_INTAKE_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:operator-assignment-evidence-intake-artifact

      - name: Check edge-only operator evidence packet artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_EDGE_ONLY_OPERATOR_EVIDENCE_PACKET_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:edge-only-operator-evidence-packet-artifact

      - name: Check edge-only Data API strict intake artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_EDGE_ONLY_DATA_API_STRICT_INTAKE_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:edge-only-data-api-strict-intake-artifact

      - name: Check edge-only Data API evidence transition fixture artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_EDGE_ONLY_DATA_API_EVIDENCE_TRANSITION_FIXTURE_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:edge-only-data-api-evidence-transition-fixture-artifact

      - name: Check operator assignment command consistency artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_OPERATOR_ASSIGNMENT_LOOP_COMMAND_CONSISTENCY_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:operator-assignment-loop-command-consistency-artifact

      - name: Check operator assignment current-head coherence artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_OPERATOR_ASSIGNMENT_CURRENT_HEAD_COHERENCE_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:operator-assignment-current-head-coherence

      - name: Check operator assignment transition fixture artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_OPERATOR_ASSIGNMENT_TRANSITION_FIXTURE_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:operator-assignment-transition-fixture-artifact

      - name: Check runtime image local smoke artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_RUNTIME_IMAGE_LOCAL_SMOKE_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:runtime-image-local-smoke-artifact

      - name: Check zero-cost reader edge sync artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_ZERO_COST_READER_EDGE_SYNC_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:zero-cost-reader-edge-sync-artifact

      - name: Check remote health evidence artifact content
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_REMOTE_HEALTH_EVIDENCE_ARTIFACT_REQUIRED: true
          CHECK_CURRENT_GITHUB_RUN_ARTIFACTS: true
        run: npm run check:remote-health-evidence-artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
