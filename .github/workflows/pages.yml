name: Deploy Creator Studio Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install --include=optional

      - name: Install app platform bindings
        run: npm --prefix app install --include=optional

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run runtime checks
        run: |
          npm --workspace @narrativeos/agent-runtime test
          npm --prefix app run lint
          python -m pytest backend/tests/test_creator_dialogue_api.py backend/tests/test_tool_bridge_api.py
          npm run scan:internal-terms
          npm run scan:p4-rule-source
          npm run scan:reference-privacy

      - name: Build Creator Studio
        run: npm --prefix app run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
